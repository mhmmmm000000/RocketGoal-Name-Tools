<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>rocketgoal-name-tools — Repo Banner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1280px;
    height: 640px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
  }

  .banner {
    position: relative;
    width: 1280px;
    height: 640px;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(34, 211, 238, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(217, 70, 239, 0.12) 0%, transparent 50%),
      #050507;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Animated grid background */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(34, 211, 238, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34, 211, 238, 0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }

  /* Floating orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.4;
  }
  .orb-1 {
    width: 300px; height: 300px;
    background: #22d3ee;
    top: -50px; left: -50px;
    animation: float1 8s ease-in-out infinite;
  }
  .orb-2 {
    width: 250px; height: 250px;
    background: #d946ef;
    bottom: -50px; right: -50px;
    animation: float2 10s ease-in-out infinite;
  }
  .orb-3 {
    width: 200px; height: 200px;
    background: #10b981;
    top: 50%; right: 20%;
    opacity: 0.2;
    animation: float3 12s ease-in-out infinite;
  }

  @keyframes float1 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(40px, 30px); }
  }
  @keyframes float2 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-40px, -30px); }
  }
  @keyframes float3 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-30px, 20px) scale(1.1); }
  }

  /* Content */
  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 0 60px;
  }

  /* Logo mark */
  .logo-mark {
    width: 80px;
    height: 80px;
    margin: 0 auto 32px;
    border-radius: 20px;
    background: linear-gradient(135deg, #22d3ee, #d946ef);
    box-shadow:
      0 0 60px rgba(34, 211, 238, 0.5),
      0 0 100px rgba(217, 70, 239, 0.3);
    position: relative;
    overflow: hidden;
  }
  .logo-mark::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%);
  }

  /* Repo name with gradient */
  .repo-name {
    font-size: 88px;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 24px;
    background: linear-gradient(90deg, #22d3ee 0%, #a855f7 50%, #d946ef 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 40px rgba(34, 211, 238, 0.4));
  }

  /* Tagline */
  .tagline {
    font-size: 26px;
    font-weight: 500;
    color: #e4e4e7;
    margin-bottom: 40px;
    letter-spacing: -0.01em;
  }
  .tagline .accent {
    background: linear-gradient(90deg, #22d3ee, #d946ef);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
  }

  /* Feature pills */
  .pills {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }
  .pill {
    padding: 8px 18px;
    border-radius: 100px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.1);
    font-size: 15px;
    font-weight: 500;
    color: #a1a1aa;
    backdrop-filter: blur(10px);
  }
  .pill .icon {
    margin-right: 6px;
    opacity: 0.8;
  }

  /* Color palette showcase */
  .palette {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 32px;
  }
  .palette-group {
    display: flex;
    gap: 3px;
    padding: 6px 10px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
  }
  .palette-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
  }

  /* Footer badges */
  .footer {
    position: absolute;
    bottom: 40px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 32px;
    z-index: 10;
  }
  .footer-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: #71717a;
    font-family: 'JetBrains Mono', monospace;
  }
  .footer-item svg {
    width: 16px;
    height: 16px;
  }

  /* Top corner badge */
  .corner-badge {
    position: absolute;
    top: 40px;
    right: 40px;
    padding: 8px 16px;
    border-radius: 100px;
    background: rgba(34, 211, 238, 0.1);
    border: 1px solid rgba(34, 211, 238, 0.3);
    color: #22d3ee;
    font-size: 13px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    z-index: 10;
  }

  /* Top left author */
  .author {
    position: absolute;
    top: 40px;
    left: 40px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 10;
  }
  .author-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #22d3ee, #d946ef);
    border: 2px solid rgba(255,255,255,0.1);
  }
  .author-name {
    font-size: 14px;
    color: #a1a1aa;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
